version: '3.8'

services:
  aionui:
    image: ghcr.io/iofficeai/aionui-web:latest
    container_name: aionui-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ALLOW_REMOTE=true
      - DATA_DIR=/data
    volumes:
      - aionui-data:/data

volumes:
  aionui-data:
    name: aionui-data
