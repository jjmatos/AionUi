version: '3.8'

services:
  aionui:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-slim AS builder
        WORKDIR /app

        # Instalar herramientas esenciales de compilación por si alguna dependencia nativa las requiere
        RUN apt-get update && apt-get install -y --no-install-recommends \
            python3 \
            make \
            g++ \
            gcc \
            && rm -rf /var/lib/apt/lists/*

        # Instalar bun
        RUN npm install -g bun

        # Copiar dependencias críticas de workspaces
        COPY package.json bun.lock ./
        COPY patches/ ./patches/
        COPY packages/ ./packages/

        # Volvemos a ignorar scripts para evitar llamadas a Electron/Desktop, pero ahora tenemos entorno C++ listo si es necesario
        RUN bun install --ignore-scripts

        # Copiar código fuente
        COPY . .

        # Compilar únicamente el servidor y los servicios del backend de agentes (omitimos el empaquetado de Electron)
        RUN node scripts/build-server.mjs

        # ---- Runtime image ----
        FROM oven/bun:latest AS runtime
        WORKDIR /app

        # Instalar librerías del sistema necesarias para OfficeCLI
        RUN apt-get update && apt-get install -y --no-install-recommends libicu-dev && rm -rf /var/lib/apt/lists/*

        # Copiar exclusivamente el backend empaquetado y las configuraciones base
        COPY --from=builder /app/dist-server ./dist-server
        COPY --from=builder /app/packages ./packages
        COPY package.json bun.lock ./
        COPY patches/ ./patches/

        RUN bun install --production --ignore-scripts

        # Configuración de producción para VPS Headless remoto
        ENV PORT=3000
        ENV NODE_ENV=production
        ENV ALLOW_REMOTE=true
        ENV DATA_DIR=/data

        VOLUME ["/data"]
        EXPOSE 3000

        CMD ["bun", "dist-server/server.mjs"]
    volumes:
      - aionui-data:/data
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ALLOW_REMOTE=true

volumes:
  aionui-data:
    name: aionui-data
