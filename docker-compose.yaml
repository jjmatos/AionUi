version: '3.8'

services:
  aionui:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-slim AS builder
        WORKDIR /app

        # Instalar bun de forma global
        RUN npm install -g bun

        # Copiar configuraciones y workspaces obligatorios
        COPY package.json bun.lock ./
        COPY patches/ ./patches/
        COPY packages/ ./packages/

        # Instalar TODAS las dependencias necesarias para compilar sin ignorar scripts de entorno
        RUN bun install

        # Copiar el resto del código fuente
        COPY . .

        # Comando unificado oficial para construir la versión de producción WebUI independiente
        RUN bun run build:web

        # ---- Imagen final ligera de ejecución ----
        FROM oven/bun:latest AS runtime
        WORKDIR /app

        # Requisito crítico del sistema operativo para previsualizar OfficeCLI
        RUN apt-get update && apt-get install -y --no-install-recommends libicu-dev && rm -rf /var/lib/apt/lists/*

        # Copiar únicamente el servidor web construido y los recursos estáticos listos
        COPY --from=builder /app/dist-server ./dist-server
        COPY --from=builder /app/out/renderer ./out/renderer
        COPY package.json bun.lock ./
        COPY patches/ ./patches/
        COPY packages/ ./packages/
        
        RUN bun install --production --ignore-scripts

        # Variables de entorno críticas para servidores VPS
        ENV PORT=3000
        ENV NODE_ENV=production
        ENV ALLOW_REMOTE=true
        ENV DATA_DIR=/data

        VOLUME ["/data"]
        EXPOSE 3000

        CMD ["bun", "dist-server/server.mjs"]
    volumes:
      - aionui-data:/data
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production

volumes:
  aionui-data:
    name: aionui-data
